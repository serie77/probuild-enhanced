spring:
  application:
    name: probuild-platform
  datasource:
    url: jdbc:h2:file:./data/probuild;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8081

camunda:
  client:
    mode: self-managed
    zeebe:
      enabled: true
      grpc-address: http://127.0.0.1:26500
      rest-address: http://127.0.0.1:8080
      prefer-rest-over-grpc: false
    auth:
      method: none

logging:
  level:
    io.camunda.zeebe.client.job.poller: ERROR
    io.grpc.internal.AbstractClientStream: ERROR
